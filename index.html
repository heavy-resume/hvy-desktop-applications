<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HVY Workspace</title>
  </head>
  <body>
    <div id="app">
      <main style="display:grid;min-height:100vh;place-items:center;font:14px system-ui;color:#334;background:#f4f1eb">
        Loading HVY Workspace...
      </main>
    </div>
    <script>
      (function installCompatibilityPolyfills() {
        function at(index) {
          var length = this == null ? 0 : this.length >>> 0;
          var offset = Math.trunc(index) || 0;
          if (offset < 0) offset += length;
          if (offset < 0 || offset >= length) return undefined;
          return this[offset];
        }
        if (!Array.prototype.at) {
          Object.defineProperty(Array.prototype, 'at', {
            value: at,
            configurable: true,
            writable: true,
          });
        }
        if (!String.prototype.at) {
          Object.defineProperty(String.prototype, 'at', {
            value: function stringAt(index) {
              var value = String(this);
              var length = value.length;
              var offset = Math.trunc(index) || 0;
              if (offset < 0) offset += length;
              if (offset < 0 || offset >= length) return undefined;
              return value.charAt(offset);
            },
            configurable: true,
            writable: true,
          });
        }
        [
          Int8Array,
          Uint8Array,
          Uint8ClampedArray,
          Int16Array,
          Uint16Array,
          Int32Array,
          Uint32Array,
          Float32Array,
          Float64Array,
          typeof BigInt64Array === 'undefined' ? null : BigInt64Array,
          typeof BigUint64Array === 'undefined' ? null : BigUint64Array,
        ].forEach(function installTypedArrayAt(TypedArray) {
          if (TypedArray && !TypedArray.prototype.at) {
            Object.defineProperty(TypedArray.prototype, 'at', {
              value: at,
              configurable: true,
              writable: true,
            });
          }
        });
      })();

      function showStartupError(error) {
        const root = document.getElementById('app');
        if (!root) return;
        root.innerHTML = '<main style="padding:24px;font:14px system-ui;color:#8c291d;background:#fff0ec;min-height:100vh"><h1>Startup error</h1><pre style="white-space:pre-wrap"></pre></main>';
        root.querySelector('pre').textContent = error && error.stack ? error.stack : String(error);
      }
      window.addEventListener('error', (event) => {
        showStartupError(event.error || event.message);
      });
      window.addEventListener('unhandledrejection', (event) => {
        showStartupError(event.reason);
      });
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
